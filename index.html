<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 디옵스케이터 (Deobfuscator)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔓 JavaScript 디옵스케이터</h1>
            <p>난독화 및 패킹된 JavaScript 코드를 해제합니다</p>
        </header>

        <div class="content">
            <div class="input-section">
                <div class="section-header">
                    <h2>입력 (난독화된 코드)</h2>
                    <div class="button-group">
                        <button id="clearInput" class="btn btn-secondary">지우기</button>
                        <button id="loadSample" class="btn btn-secondary">샘플 로드</button>
                    </div>
                </div>
                <textarea id="inputCode" placeholder="난독화된 JavaScript 코드를 여기에 붙여넣으세요..."></textarea>
            </div>

            <div class="controls">
                <button id="deobfuscateBtn" class="btn btn-primary">🔓 디옵스케이트</button>
                <div class="options">
                    <label>
                        <input type="checkbox" id="beautify" checked>
                        코드 정리 (Beautify)
                    </label>
                    <label>
                        <input type="checkbox" id="unpackEval" checked>
                        eval() 해제
                    </label>
                    <label>
                        <input type="checkbox" id="unpackPacker" checked>
                        Packer 해제
                    </label>
                </div>
            </div>

            <div class="output-section">
                <div class="section-header">
                    <h2>출력 (디옵스케이트된 코드)</h2>
                    <div class="button-group">
                        <button id="copyOutput" class="btn btn-secondary">📋 복사</button>
                        <button id="downloadOutput" class="btn btn-secondary">💾 다운로드</button>
                    </div>
                </div>
                <textarea id="outputCode" readonly placeholder="디옵스케이트된 코드가 여기에 표시됩니다..."></textarea>
            </div>
        </div>

        <div class="info">
            <h3>지원되는 난독화 방식:</h3>
            <ul>
                <li>✅ eval() 기반 난독화</li>
                <li>✅ Packer (Dean Edwards) 패킹</li>
                <li>✅ 16진수 문자열 인코딩</li>
                <li>✅ Unicode 이스케이프 시퀀스</li>
                <li>✅ Array/Object 디코딩</li>
            </ul>
        </div>

        <footer>
            <p>JavaScript Deobfuscator - 오픈소스 프로젝트</p>
        </footer>
    </div>

    <script src="deobfuscator.js"></script>
    <script src="app.js"></script>
</body>
</html>
